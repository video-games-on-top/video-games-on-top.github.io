<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | streets2shelters</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="images/Logo1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: { brand:'#7BAF9E', brandDark:'#5E8F80', cream:'#F4EFE6', deep:'#2B1F1C', creamdark:'#c3bfb8' },
              fontFamily: { heading:['Playfair Display','serif'], body:['Inter','sans-serif'] }
            }
          }
        }
    </script>
    <style>
        @import url('main.css');
        /* ==========================================================================
           1. FORM ELEMENT MICRO-INTERACTIONS
           ========================================================================== */
        .form-input { transition:all 0.3s ease;border-radius:4px; }
        .form-input:focus { transform:scale(1.005);outline:none; }

        /* Full-Width Form Submission Button Mod */
        .btn-submit {
          width:100%;background:#7BAF9E;color:#fff;
          padding:15px 28px;border-radius:4px;font-size:13px;font-weight:600;
          letter-spacing:0.07em;text-transform:uppercase;border:none;cursor:pointer;
          transition:background 0.28s ease,transform 0.3s cubic-bezier(0.16,1,0.3,1),box-shadow 0.3s ease;
          box-shadow:0 2px 10px rgba(123,175,158,0.2);
        }
        .btn-submit:hover { background:#5E8F80;transform:translateY(-2px);box-shadow:0 10px 28px rgba(94,143,128,0.35); }
        .btn-submit:active { transform:translateY(0); }

        /* ==========================================================================
           2. CONTACT PAGE CAROUSEL VARIANT
           ========================================================================== */
        .carousel-container { position:relative;height:420px;overflow:hidden;display:flex;justify-content:center;align-items:center; }
        .carousel-item { position:absolute;width:380px;height:380px;border-radius:12px;object-fit:cover;opacity:0;z-index:0;transition:all 0.7s cubic-bezier(0.34,1.15,0.64,1),opacity 0.5s cubic-bezier(0.16,1,0.3,1); }
        .carousel-item.active  { opacity:1;transform:translateX(0) scale(1);z-index:5;box-shadow:0 24px 56px rgba(0,0,0,0.2); }
        .carousel-item.prev-1  { opacity:.5;transform:translateX(-42%) scale(0.8);z-index:4; }
        .carousel-item.next-1  { opacity:.5;transform:translateX(42%) scale(0.8);z-index:4; }
        .carousel-item.prev-2  { opacity:.15;transform:translateX(-72%) scale(0.62);z-index:3; }
        .carousel-item.next-2  { opacity:.15;transform:translateX(72%) scale(0.62);z-index:3; }
        #contact-carousel-dots button { transition:width 0.4s cubic-bezier(0.34,1.26,0.64,1),background 0.3s ease; }

        /* ==========================================================================
           3. RESPONSIVE BREAKPOINTS
           ========================================================================== */
        @media(max-width:768px){
          .carousel-container{height:260px}
          .carousel-item{width:200px;height:180px}
          .carousel-item.prev-1{transform:translateX(-36%) scale(0.86)}
          .carousel-item.next-1{transform:translateX(36%) scale(0.86)}
          .carousel-item.prev-2,.carousel-item.next-2{opacity:0}
        }
    </style>
</head>

<body class="bg-cream text-deep font-body">

<div id="progress-bar"></div>

<div id="header-placeholder" class="sticky top-0 z-50 w-full"></div>
<!-- HERO / FORM SECTION -->
<main class="pt-40 pb-16 max-w-7xl mx-auto px-6">
    <div class="grid md:grid-cols-2 gap-16 items-start">

        <!-- Left: Form -->
        <div>
            <div class="r-fade mb-4">
                <span class="inline-flex items-center gap-2 text-xs font-semibold tracking-widest uppercase px-4 py-1.5 rounded-sm border border-brand/25 text-brandDark" style="background:rgba(123,175,158,0.07);">
                    <span class="w-1.5 h-1.5 rounded-full bg-brand inline-block"></span>
                    Get in Touch
                </span>
            </div>
            <h1 class="text-5xl font-heading font-bold mb-3 r-up">Contact <em class="text-brand">Us</em></h1>
            <p class="text-gray-500 mb-10 r-up leading-relaxed" style="transition-delay:0.08s">Have a question, partnership idea, or just want to say hello? We'd love to hear from you.</p>

            <form id="contact-form" action="https://formspree.io/f/mbdanoqz" method="POST"
                  class="bg-white p-10 rounded-2xl shadow-sm border border-brand/10 space-y-6 r-scale" style="transition-delay:0.12s">
                <div>
                    <label class="block mb-2 font-medium text-sm uppercase tracking-wider text-deep/60">Full Name</label>
                    <input type="text" name="name" required
                           class="form-input w-full p-4 border border-gray-200 focus:ring-2 focus:ring-brand bg-cream/30">
                </div>
                <div>
                    <label class="block mb-2 font-medium text-sm uppercase tracking-wider text-deep/60">Email Address</label>
                    <input type="email" name="email" required
                           class="form-input w-full p-4 border border-gray-200 focus:ring-2 focus:ring-brand bg-cream/30">
                </div>
                <div>
                    <label class="block mb-2 font-medium text-sm uppercase tracking-wider text-deep/60">Message</label>
                    <textarea name="message" rows="5" required
                              class="form-input w-full p-4 border border-gray-200 focus:ring-2 focus:ring-brand bg-cream/30"></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    Send Message
                </button>

                <div id="form-status" class="mt-4 font-medium text-sm text-center"></div>
            </form>



            <!-- Contact Info -->
            <div class="mt-8 bg-white rounded-2xl p-6 border border-brand/10 r-up" style="transition-delay:0.25s">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-widest text-brand mb-1">Email</p>
                        <p class="font-medium text-deep text-sm">streetstoshelters.tx@gmail.com</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Carousel -->
        <div class="r-left" style="transition-delay:0.1s">
            <div class="carousel-container mb-6" id="contact-carousel" role="region" aria-label="streets2shelters photos">
                <img src="images/sts1.jpg"  class="carousel-item" alt="streets2shelters team" loading="lazy">
                <img src="images/sts7.jpg"  class="carousel-item" alt="Volunteer" loading="lazy">
                <img src="images/sts4.jpg"  class="carousel-item" alt="Community" loading="lazy">
                <img src="images/sts3.jpg"  class="carousel-item" alt="Kit assembly" loading="lazy">
                <img src="images/sts9.jpg"  class="carousel-item" alt="Events" loading="lazy">
            </div>
            <div class="flex justify-center items-center gap-4">
                <button id="contact-prev" aria-label="Previous photo" class="w-9 h-9 rounded-full border border-deep/25 flex items-center justify-center hover:border-deep hover:bg-deep hover:text-white transition-all duration-300">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div class="flex gap-2" id="contact-carousel-dots"></div>
                <button id="contact-next" aria-label="Next photo" class="w-9 h-9 rounded-full border border-deep/25 flex items-center justify-center hover:border-deep hover:bg-deep hover:text-white transition-all duration-300">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>
    </div>
</main>


<div id="footer-placeholder"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        /* Progress bar */
        const bar = document.getElementById('progress-bar');
        window.addEventListener('scroll', () => {
            const total = document.documentElement.scrollHeight - window.innerHeight;
            bar.style.width = (total > 0 ? (window.scrollY / total) * 100 : 0) + '%';
            document.body.classList.toggle('scrolled', window.scrollY > 60);
        }, { passive: true });

        /* Mobile menu */
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const closeBtn  = document.getElementById('close-menu-btn');
        const overlay   = document.getElementById('mobile-menu-overlay');
        if (mobileBtn && overlay) {
            mobileBtn.addEventListener('click', () => overlay.classList.remove('translate-x-full'));
            closeBtn.addEventListener('click',  () => overlay.classList.add('translate-x-full'));
            overlay.querySelectorAll('a').forEach(a => a.addEventListener('click', () => overlay.classList.add('translate-x-full')));
        }

        /* Scroll reveal */
        const revObs = new IntersectionObserver((entries, obs) => {
            entries.forEach(e => { if (!e.isIntersecting) return; e.target.classList.add('is-visible'); obs.unobserve(e.target); });
        }, { threshold: 0.06, rootMargin: '0px 0px -40px 0px' });
        document.querySelectorAll('.r-up,.r-left,.r-scale,.r-fade').forEach(el => revObs.observe(el));

        /* Carousel */
        const items = Array.from(document.querySelectorAll('.carousel-item'));
        const dotsCon = document.getElementById('contact-carousel-dots');
        const prevBtn = document.getElementById('contact-prev');
        const nextBtn = document.getElementById('contact-next');
        let cIdx = 0, cTimer = null;
        if (items.length) {
            const total = items.length;
            items.forEach((_, i) => {
                const d = document.createElement('button');
                d.setAttribute('aria-label', 'Photo ' + (i + 1));
                d.className = 'h-2 rounded-full transition-all duration-400';
                d.classList.add(i === 0 ? 'bg-deep' : 'bg-deep/25', i === 0 ? 'w-6' : 'w-2');
                d.addEventListener('click', () => { cIdx = i; update(); reset(); });
                dotsCon.appendChild(d);
            });
            const dots = dotsCon.querySelectorAll('button');
            function update() {
                items.forEach((item, i) => {
                    item.classList.remove('active','prev-1','next-1','prev-2','next-2');
                    const d = ((i - cIdx) % total + total) % total;
                    if (d===0) item.classList.add('active');
                    else if (d===1) item.classList.add('next-1');
                    else if (d===total-1) item.classList.add('prev-1');
                    else if (d===2) item.classList.add('next-2');
                    else if (d===total-2) item.classList.add('prev-2');
                });
                dots.forEach((d,i) => {
                    d.classList.toggle('bg-deep', i===cIdx);
                    d.classList.toggle('w-6', i===cIdx);
                    d.classList.toggle('bg-deep/25', i!==cIdx);
                    d.classList.toggle('w-2', i!==cIdx);
                });
            }
            function advance(dir) { cIdx = (cIdx + dir + total) % total; update(); reset(); }
            function reset() { clearInterval(cTimer); cTimer = setInterval(() => advance(1), 3800); }
            prevBtn && prevBtn.addEventListener('click', () => advance(-1));
            nextBtn && nextBtn.addEventListener('click', () => advance(1));
            const car = document.getElementById('contact-carousel');
            let tx = null;
            car.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive:true });
            car.addEventListener('touchend', e => {
                if (tx===null) return;
                const dx = e.changedTouches[0].clientX - tx;
                if (Math.abs(dx) > 40) advance(dx < 0 ? 1 : -1);
                tx = null;
            }, { passive:true });
            car.addEventListener('mouseenter', () => clearInterval(cTimer));
            car.addEventListener('mouseleave', () => reset());
            requestAnimationFrame(() => { update(); reset(); });
        }
         fetch('header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    });

  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    });
    });
</script>
<script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", function(event) {
      event.preventDefault(); // Stop Formspree from taking over the page

      const data = new FormData(form);

      fetch(form.action, {
        method: form.method,
        body: data,
        headers: {
            'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
// 1. Grant the temporary pass
sessionStorage.setItem("formSubmitted", "true");

// 2. Redirect to the thanks page
window.location.href = "/thanks";

          // OR if you just want to show a message without redirecting, uncomment below:
          // status.style.color = "green";
          // status.innerHTML = "Thanks for reaching out! Your message has been sent.";
          // form.reset();
        } else {
          response.json().then(data => {
            status.style.color = "red";
            if (Object.hasOwn(data, 'errors')) {
              status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
            } else {
              status.innerHTML = "Oops! There was a problem submitting your form.";
            }
          })
        }
      }).catch(error => {
        status.style.color = "red";
        status.innerHTML = "Oops! There was a problem submitting your form.";
      });
    });
</script>

<script src="main.js"></script>
</body>
</html>
