<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Stack Scroll</title>
    <style>
        /* Basic page setup to give us room to scroll */
        body {
          margin: 0;
          padding: 0;
          background-color: #f0f0f0;
          font-family: sans-serif;
        }

        .spacer {
          height: 50vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        /* The container holding all the cards */
        .card-deck {
          max-width: 800px;
          margin: 0 auto;
          padding: 40px 20px;
        }

        /* The actual cards */
        .card {
          height: 60vh; /* Make the card take up a good chunk of the screen */
          background-color: #ffffff;
          border-radius: 20px;
          box-shadow: 0 -15px 30px rgba(0,0,0,0.1);

          /* THE MAGIC: This makes the card stick to the top when it hits a certain point */
          position: sticky;

          /* We use CSS variables (--index) to stagger the cards so they peek out over each other */
          top: calc(40px + (20px * var(--index)));

          /* Space between cards before they stack */
          margin-bottom: 60vh;

          /* Flexbox to center the content inside the card */
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
        }

        /* Styling for the images inside the cards */
        .card img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        /* Just coloring the placeholders so you can see them without images */
        .card:nth-child(1) { background-color: #FFB3BA; }
        .card:nth-child(2) { background-color: #FFDFBA; }
        .card:nth-child(3) { background-color: #FFFFBA; }
        .card:nth-child(4) { background-color: #BAFFC9; }
    </style>
</head>
<body>

<div class="spacer">
    <h2>Scroll Down 👇</h2>
</div>

<div class="card-deck">
    <div class="card" style="--index: 1;">
        <h2>Image 1</h2>
    </div>

    <div class="card" style="--index: 2;">
        <h2>Image 2</h2>
    </div>

    <div class="card" style="--index: 3;">
        <h2>Image 3</h2>
    </div>

    <div class="card" style="--index: 4;">
        <h2>Image 4</h2>
    </div>
</div>

<div class="spacer">
    <h2>End of Deck</h2>
</div>

</body>
</html>
