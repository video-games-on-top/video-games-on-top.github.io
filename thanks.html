    <style>

        @import url('main.css');

        /* ==========================================================================
           1. SPONSORS SECTION LAYOUT
           ========================================================================== */
        .sponsor-slot { height:72px;display:flex;align-items:center;justify-content:center; }
        .sponsor-slot img[src=""] { display:none; }
        .sponsor-slot:has(img[src=""]){background:repeating-linear-gradient(45deg,rgba(123,175,158,0.04),rgba(123,175,158,0.04) 10px,transparent 10px,transparent 20px);border:1.5px dashed rgba(123,175,158,0.2);border-radius:8px;min-height:72px;}

        /* ==========================================================================
           2. MISSION CARDS MODULE
           ========================================================================== */
        .mission-card { transition:transform 0.5s cubic-bezier(0.16,1,0.3,1),box-shadow 0.5s cubic-bezier(0.16,1,0.3,1); }
        .mission-card:hover { transform:translateY(-6px);box-shadow:0 24px 48px -12px rgba(123,175,158,0.2); }
        .mission-card .bar { transition:width 0.55s cubic-bezier(0.16,1,0.3,1);width:0; }
        .mission-card:hover .bar { width:100%; }
        .step-line { position:absolute;top:28px;left:calc(50% + 40px);width:calc(100% - 80px);height:1px;background:linear-gradient(90deg,#7BAF9E 0%,transparent 100%);opacity:0.25; }
        @media(max-width:767px){.step-line{display:none}}

        /* ==========================================================================
           3. DYNAMIC IMPACT METRICS LAYOUT
           ========================================================================== */
        .impact-row { display:grid;grid-template-columns:1fr 1fr;min-height:440px;overflow:hidden; }
        .impact-photo { position:relative;overflow:hidden; }
        .impact-photo img { width:100%;height:100%;object-fit:cover;transition:transform 0.9s cubic-bezier(0.16,1,0.3,1); }
        .impact-photo:hover img { transform:scale(1.03); }
        .impact-stats-panel { background:#2B1F1C;display:flex;flex-direction:column;justify-content:center;padding:72px 60px; }
        .impact-eyebrow { font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#7BAF9E;margin-bottom:18px;display:block; }
        .impact-heading { font-family:'Playfair Display',serif;font-size:clamp(24px,2.6vw,36px);font-weight:700;line-height:1.25;color:#F4EFE6;margin-bottom:48px; }
        .impact-heading em { font-style:italic;color:#7BAF9E; }
        .stat-row { display:flex;flex-direction:column;border-top:1px solid rgba(244,239,230,0.07); }
        .stat-item { display:grid;grid-template-columns:100px 1fr;align-items:center;gap:28px;padding:22px 0;border-bottom:1px solid rgba(244,239,230,0.07);transition:padding-left 0.3s cubic-bezier(0.16,1,0.3,1); }
        .stat-item:hover { padding-left:6px; }
        .stat-num { font-family:'Playfair Display',serif;font-size:clamp(34px,3.5vw,48px);font-weight:700;color:#F4EFE6;line-height:1;letter-spacing:-0.02em;display:block; }
        .stat-info-label { font-size:12px;font-weight:500;color:rgba(244,239,230,0.4);letter-spacing:0.07em;display:block;margin-bottom:8px; }
        .stat-bar-track { height:1px;background:rgba(244,239,230,0.1);border-radius:1px;overflow:hidden; }
        .stat-bar-fill { height:1px;background:#7BAF9E;border-radius:1px;width:0;transition:width 1.4s cubic-bezier(0.16,1,0.3,1); }
        .stat-bar-fill.animated { width:var(--fill); }

        /* ==========================================================================
           4. 3-STEP SUPPORT GRID SYSTEM
           ========================================================================== */
        .support-eyebrow { font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#7BAF9E;margin-bottom:14px;display:block; }
        .support-h2 { font-family:'Playfair Display',serif;font-size:clamp(30px,3.2vw,46px);font-weight:700;line-height:1.15;color:#2B1F1C;letter-spacing:-0.01em; }
        .support-h2 em { font-style:italic;color:#7BAF9E; }
        .support-grid { display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid rgba(43,31,28,0.07); }
        .support-card { padding:52px 44px 48px;border-right:1px solid rgba(43,31,28,0.07);position:relative;overflow:hidden;transition:background 0.35s cubic-bezier(0.16,1,0.3,1); }
        .support-card:last-child { border-right:none; }
        .support-card::before { content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:#7BAF9E;transition:width 0.5s cubic-bezier(0.16,1,0.3,1); }
        .support-card:hover { background:rgba(123,175,158,0.03); }
        .support-card:hover::before { width:100%; }
        .support-step { font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(43,31,28,0.25);margin-bottom:26px;display:block; }
        .support-icon-ring { width:50px;height:50px;border-radius:50%;border:1.5px solid rgba(123,175,158,0.28);display:flex;align-items:center;justify-content:center;color:#7BAF9E;margin-bottom:26px;transition:border-color 0.3s,background 0.3s,transform 0.4s cubic-bezier(0.16,1,0.3,1); }
        .support-card:hover .support-icon-ring { border-color:#7BAF9E;background:#7BAF9E;color:#fff;transform:scale(1.06); }
        .support-title { font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:#2B1F1C;margin-bottom:12px;line-height:1.25; }
        .support-body { font-size:14px;font-weight:400;line-height:1.8;color:rgba(43,31,28,0.5);margin-bottom:30px; }

        /* Dedicated Local Component Link (Not handled by global.css due to unique context) */
        .support-link { display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#7BAF9E;text-decoration:none;transition:gap 0.3s cubic-bezier(0.16,1,0.3,1),color 0.2s; }
        .support-link:hover { color:#5E8F80;gap:11px; }
        .support-link svg { transition:transform 0.3s cubic-bezier(0.16,1,0.3,1); }
        .support-link:hover svg { transform:translateX(2px); }

        /* ==========================================================================
           5. COMPONENT TABLET & MOBILE RESPONSIVE ADAPTATIONS
           ========================================================================== */
        @media(max-width:900px){
          .support-grid{grid-template-columns:1fr;}
          .support-card{border-right:none;border-bottom:1px solid rgba(43,31,28,0.07);padding:40px 7vw;}
          .support-card:last-child{border-bottom:none;}
          .impact-row{grid-template-columns:1fr;}
          .impact-photo{min-height:300px;}
          .impact-stats-panel{padding:52px 7vw;}
        }
    </style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
    window.addEventListener('DOMContentLoaded', () => {
      const duration = 2 * 1000;
      const animationEnd = Date.now() + duration;
      const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      const interval = setInterval(function() {
        const timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
          return clearInterval(interval);
        }

        const particleCount = 50 * (timeLeft / duration);
        // confetti shoots from left and right edges
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
      }, 250);
    });
</script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
      const mobileBtn = document.getElementById('mobile-menu-btn');
      const closeBtn  = document.getElementById('close-menu-btn');
      const overlay   = document.getElementById('mobile-menu-overlay');
      if (mobileBtn && overlay) {
        mobileBtn.addEventListener('click', () => overlay.classList.remove('translate-x-full'));
        closeBtn.addEventListener('click',  () => overlay.classList.add('translate-x-full'));
        overlay.querySelectorAll('a').forEach(a => a.addEventListener('click', () => overlay.classList.add('translate-x-full')));
      }

      const bar = document.getElementById('progress-bar');
      window.addEventListener('scroll', () => {
        const total = document.documentElement.scrollHeight - window.innerHeight;
        bar.style.width = (total > 0 ? (window.scrollY / total) * 100 : 0) + '%';
        document.body.classList.toggle('scrolled', window.scrollY > 60);
      }, { passive: true });

      const h1 = document.getElementById('hero-heading');
      if (h1) {
        const wrap = node => {
          if (node.nodeType === 3) {
            const frag = document.createDocumentFragment();
            node.textContent.split(/(\s+)/).forEach(part => {
              if (/^\s+$/.test(part) || part === '') { frag.appendChild(document.createTextNode(part)); return; }
              const w = document.createElement('span'); w.className = 'word-wrap';
              const i = document.createElement('span'); i.className = 'word-inner';
              i.textContent = part; w.appendChild(i); frag.appendChild(w);
            });
            node.replaceWith(frag);
          } else if (node.nodeType === 1 && node.tagName !== 'SCRIPT') {
            const w = document.createElement('span'); w.className = 'word-wrap';
            const i = document.createElement('span'); i.className = 'word-inner';
            i.appendChild(node.cloneNode(true)); w.appendChild(i); node.replaceWith(w);
          }
        };
        Array.from(h1.childNodes).forEach(wrap);
        h1.querySelectorAll('.word-inner').forEach((w, idx) => { w.style.transitionDelay = (0.005 + idx * 0.025) + 's'; });
        setTimeout(() => h1.querySelectorAll('.word-inner').forEach(w => w.classList.add('is-visible')), 80);
      }

      const heroCard = document.getElementById('hero-card');
      if (heroCard) {
        heroCard.parentElement.addEventListener('mousemove', e => {
          const r = heroCard.getBoundingClientRect();
          const rx = ((e.clientY - r.top  - r.height / 2) / (r.height / 2)) *  5;
          const ry = ((e.clientX - r.left - r.width  / 2) / (r.width  / 2)) * -5;
          heroCard.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg)`;
        });
        heroCard.parentElement.addEventListener('mouseleave', () => { heroCard.style.transform = ''; });
      }

      const revObs = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => { if (!e.isIntersecting) return; e.target.classList.add('is-visible'); obs.unobserve(e.target); });
      }, { threshold: 0.06, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.r-up,.r-left,.r-right,.r-scale,.r-fade').forEach(el => revObs.observe(el));

      const easeOut = t => 1 - Math.pow(1 - t, 4);
      const ctrObs = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => {
          if (!e.isIntersecting) return;
          const el = e.target, target = +el.dataset.target, suffix = el.dataset.suffix || '';
          if (target === 0) { el.textContent = '0' + suffix; obs.unobserve(el); return; }
          const dur = 1800, t0 = performance.now();
          (function tick(now) {
            const p = Math.min((now - t0) / dur, 1);
            el.textContent = Math.round(easeOut(p) * target) + suffix;
            p < 1 ? requestAnimationFrame(tick) : (el.textContent = target + suffix);
          })(t0);
          obs.unobserve(el);
        });
      }, { threshold: 0.5 });
      document.querySelectorAll('[data-target]').forEach(el => ctrObs.observe(el));

      const barObs = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => {
          if (!e.isIntersecting) return;
          e.target.querySelectorAll('.stat-bar-fill').forEach((b, i) => setTimeout(() => b.classList.add('animated'), i * 200));
          obs.unobserve(e.target);
        });
      }, { threshold: 0.3 });
      const sp = document.querySelector('.impact-stats-panel');
      if (sp) barObs.observe(sp);
 fetch('header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    });

  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    });
    });

</script>
